name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: cargo ${{ matrix.action }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        action: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4

      # The GUI binary (Phase 3b) needs GTK4 + libadwaita; the core playback
      # host (Phase 4a) links the system libmpv; rusqlite stays `bundled`.
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libmpv-dev
      # rsgain (Phase 5c) is best-effort: the ReplayGain scan test skips when it
      # is absent, so a missing package never fails CI.
      - name: Install rsgain (best-effort)
        run: sudo apt-get install -y rsgain || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --all --check
        if: matrix.action == 'fmt'
        run: cargo fmt --all --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        if: matrix.action == 'clippy'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace
        if: matrix.action == 'test'
        run: cargo test --workspace

  # The music-only build (spec §2.2): both binaries with the podcasts and
  # audiobooks plugin features off. Kept green from day one so the feature
  # gating can't rot between now and Phases 6/7.
  music-only:
    name: music-only (no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # core (and thus the music-only binaries) links the system libmpv at
      # Phase 4a, so this job needs it too.
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libmpv-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy (music-only)
        run: cargo clippy -p conservatory-cli -p conservatory --no-default-features --all-targets -- -D warnings

      - name: cargo test (music-only)
        run: cargo test -p conservatory-cli -p conservatory --no-default-features
